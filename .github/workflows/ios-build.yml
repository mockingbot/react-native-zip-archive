name: iOS Build

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-ios:
    name: Build iOS (playground-rn)
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: playground-rn/node_modules
          key: ${{ runner.os }}-rn-node-${{ hashFiles('playground-rn/package.json') }}

      - name: Install dependencies
        working-directory: playground-rn
        run: |
          if [ -f "pnpm-lock.yaml" ]; then
            npm install -g pnpm@9
            pnpm install
          else
            npm install
          fi

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: playground-rn/ios/Pods
          key: ${{ runner.os }}-rn-pods-${{ hashFiles('playground-rn/ios/Podfile.lock') }}

      - name: Install CocoaPods
        working-directory: playground-rn/ios
        run: |
          gem install cocoapods -v '>= 1.13'
          pod install

      - name: Build iOS app
        working-directory: playground-rn/ios
        run: |
          xcodebuild \
            -workspace PlaygroundRN.xcworkspace \
            -scheme PlaygroundRN \
            -configuration Release \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO
