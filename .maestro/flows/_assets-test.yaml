appId: ${APP_ID}
---
- runFlow:
    when:
      notVisible: "Assets (Android)"
    commands:
      - tapOn: "Playground"
- scrollUntilVisible:
    element:
      text: "Assets (Android)"
    direction: DOWN
- tapOn: "Assets (Android)"
- runFlow:
    when:
      visible: "Not Supported"
    commands:
      - assertVisible: "Not Supported"
- runFlow:
    when:
      visible: "Android Assets Demo"
    commands:
      - assertVisible: "Android Assets Demo"
      - tapOn: "Unzip Assets"
      - waitForAnimationToEnd:
          timeout: 10000
      - assertVisible: "Extracted To"
      - extendedWaitUntil:
          visible: "Files:"
          timeout: 10000
      - assertVisible: "Files:"
