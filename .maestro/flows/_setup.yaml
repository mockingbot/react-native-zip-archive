appId: ${APP_ID}
---
- stopApp
- launchApp

- runFlow:
    when:
      visible: "DEVELOPMENT SERVERS"
    commands:
      - tapOn: "RNZipArchive Playground"
      - runFlow:
          when:
            visible: "Open"
          commands:
            - tapOn: "Open"
      - runFlow:
          when:
            visible: "Continue"
          commands:
            - tapOn: "Continue"
      - runFlow:
          when:
            visible: "Reload"
          commands:
            - tapOn: "Reload"

- runFlow:
    when:
      visible: "http://localhost:8081"
    commands:
      - tapOn: "http://localhost:8081"
      - runFlow:
          when:
            visible: "Open"
          commands:
            - tapOn: "Open"
      - runFlow:
          when:
            visible: "Continue"
          commands:
            - tapOn: "Continue"
      - runFlow:
          when:
            visible: "Reload"
          commands:
            - tapOn: "Reload"

- runFlow:
    when:
      visible: "http://10.0.2.2:8081"
    commands:
      - tapOn: "http://10.0.2.2:8081"
      - runFlow:
          when:
            visible: "Open"
          commands:
            - tapOn: "Open"
      - runFlow:
          when:
            visible: "Continue"
          commands:
            - tapOn: "Continue"
      - runFlow:
          when:
            visible: "Reload"
          commands:
            - tapOn: "Reload"

# The GitHub Actions Android emulator (API 29, software GPU) occasionally shows
# a system-level "System UI isn't responding" ANR dialog that is unrelated to
# the app. The dialog uses a straight ASCII apostrophe; match that exactly.
# Poll for the dialog on Android while the playground screen is still hidden,
# and tap "Wait" so the loaded app stays in focus.
- runFlow:
    when:
      platform: Android
    commands:
      - repeat:
          times: 60
          while:
            notVisible: "RNZipArchive Playground"
          commands:
            - runFlow:
                when:
                  visible: "System UI isn't responding"
                commands:
                  - tapOn: "Wait"
            - waitForAnimationToEnd:
                timeout: 2000

- extendedWaitUntil:
    visible: "RNZipArchive Playground"
    timeout: 10000

- runFlow:
    when:
      visible: "Toggle performance monitor"
    commands:
      - pressKey: BACK
