appId: ${APP_ID}
---
- stopApp
- launchApp

- runFlow:
    when:
      visible: "DEVELOPMENT SERVERS"
    commands:
      - tapOn: "RNZipArchive Playground"
      - runFlow:
          when:
            visible: "Open"
          commands:
            - tapOn: "Open"
      - runFlow:
          when:
            visible: "Continue"
          commands:
            - tapOn: "Continue"
      - runFlow:
          when:
            visible: "Reload"
          commands:
            - tapOn: "Reload"

- runFlow:
    when:
      visible: "http://localhost:8081"
    commands:
      - tapOn: "http://localhost:8081"
      - runFlow:
          when:
            visible: "Open"
          commands:
            - tapOn: "Open"
      - runFlow:
          when:
            visible: "Continue"
          commands:
            - tapOn: "Continue"
      - runFlow:
          when:
            visible: "Reload"
          commands:
            - tapOn: "Reload"

- runFlow:
    when:
      visible: "http://10.0.2.2:8081"
    commands:
      - tapOn: "http://10.0.2.2:8081"
      - runFlow:
          when:
            visible: "Open"
          commands:
            - tapOn: "Open"
      - runFlow:
          when:
            visible: "Continue"
          commands:
            - tapOn: "Continue"
      - runFlow:
          when:
            visible: "Reload"
          commands:
            - tapOn: "Reload"

# The GitHub Actions Android emulator (API 29, software GPU) occasionally shows
# a system-level "System UI isn't responding" dialog that is unrelated to the
# app. Tap Wait so the loaded app stays in focus and the test can continue.
- runFlow:
    when:
      visible: "System UI isn’t responding"
    commands:
      - tapOn: "Wait"

- extendedWaitUntil:
    visible: "RNZipArchive Playground"
    timeout: 180000

- runFlow:
    when:
      visible: "Toggle performance monitor"
    commands:
      - pressKey: BACK
