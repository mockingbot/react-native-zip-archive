appId: com.example.rnziparchive.playground
---
- launchApp
- runFlow:
    when:
      visible: "http://localhost:8081"
    commands:
      - tapOn: "http://localhost:8081"
      - runFlow:
          when:
            visible: "Continue"
          commands:
            - tapOn: "Continue"
      - runFlow:
          when:
            visible: "Reload"
          commands:
            - tapOn:
                id: "closeButton"
- extendedWaitUntil:
    visible: "RNZipArchive Playground"
    timeout: 45000
- tapOn: "Assets (Android)"
- assertVisible: "Android Assets Demo"
- tapOn: "Unzip Assets"
- waitForAnimationToEnd:
    timeout: 10000
- assertVisible: "Extracted To"
- assertVisible: "sample-zip/sample.txt"
- assertVisible: "sample-zip/another.txt"
