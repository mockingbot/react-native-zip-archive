appId: ${APP_ID}
---
- runFlow:
    when:
      visible: "DEVELOPMENT SERVERS"
    commands:
      - tapOn: "RNZipArchive Playground"
      - runFlow:
          when:
            visible: "Open"
          commands:
            - tapOn: "Open"
      - runFlow:
          when:
            visible: "Continue"
          commands:
            - tapOn: "Continue"
      - runFlow:
          when:
            visible: "Reload"
          commands:
            - tapOn: "Reload"
- stopApp
- launchApp
- runFlow:
    when:
      visible: "http://localhost:8081"
    commands:
      - tapOn: "http://localhost:8081"
      - runFlow:
          when:
            visible: "Open"
          commands:
            - tapOn: "Open"
      - runFlow:
          when:
            visible: "Continue"
          commands:
            - tapOn: "Continue"
      - runFlow:
          when:
            visible: "Reload"
          commands:
            - tapOn: "Reload"
- runFlow:
    when:
      visible: "http://10.0.2.2:8081"
    commands:
      - tapOn: "http://10.0.2.2:8081"
      - runFlow:
          when:
            visible: "Open"
          commands:
            - tapOn: "Open"
      - runFlow:
          when:
            visible: "Continue"
          commands:
            - tapOn: "Continue"
      - runFlow:
          when:
            visible: "Reload"
          commands:
            - tapOn: "Reload"
- extendedWaitUntil:
    visible: "RNZipArchive Playground"
    timeout: 45000
- runFlow:
    when:
      visible: "Toggle performance monitor"
    commands:
      - pressKey: BACK
- tapOn: "Password Protection"
- assertVisible: "Create Password Zip"
- tapOn: "Create Password Zip"
- waitForAnimationToEnd:
    timeout: 10000
- assertVisible: "Zip Created"
- assertVisible: "Password Protected: Yes"
- tapOn: "Unzip with Password"
- waitForAnimationToEnd:
    timeout: 10000
- assertVisible: "Extracted"
